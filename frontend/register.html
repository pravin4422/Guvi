<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="./css/register.css">
</head>
<body>

<div class="register-card card">
    <div class="card-header-section">
        <div class="icon-circle">
            <i class="bi bi-person-plus-fill"></i>
        </div>
        <h4>Create Account</h4>
        <p>Sign up to get started</p>
    </div>

    <div class="card-body-section">
        <div class="mb-3">
            <label class="form-label text-muted small fw-semibold">Full Name</label>
            <div class="input-group">
                <span class="input-group-text"><i class="bi bi-person"></i></span>
                <input type="text" id="name" class="form-control" placeholder="Enter your name">
            </div>
        </div>

        <div class="mb-3">
            <label class="form-label text-muted small fw-semibold">Email Address</label>
            <div class="input-group">
                <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                <input type="email" id="email" class="form-control" placeholder="Enter your email">
            </div>
        </div>

        <div class="mb-4">
            <label class="form-label text-muted small fw-semibold">Password</label>
            <div class="input-group">
                <span class="input-group-text"><i class="bi bi-lock"></i></span>
                <input type="password" id="password" class="form-control" placeholder="Create a password">
            </div>
        </div>

        <button class="btn btn-register btn-primary w-100 text-white" onclick="register()">
            <i class="bi bi-check-circle me-2"></i>Create Account
        </button>

        <p class="text-center mt-4 mb-0 login-link">
            Already have an account? <a href="login.html">Sign in</a>
        </p>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="./js/register.js"></script>

</body>
</html>
