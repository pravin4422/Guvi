<!DOCTYPE html>
<html>
<head>
    <title>Profile</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="card p-4">
        <h3 class="text-center">Profile</h3>

        <input type="number" id="age" class="form-control my-2" placeholder="Age">
        <input type="date" id="dob" class="form-control my-2">
        <input type="text" id="contact" class="form-control my-2" placeholder="Contact">

        <button class="btn btn-primary w-100 mt-3" onclick="updateProfile()">Update</button>
        <button class="btn btn-danger w-100 mt-2" onclick="logout()">Logout</button>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="js/profile.js"></script>

</body>
</html>
