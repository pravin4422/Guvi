<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="css/login.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="card p-4">
        <h3 class="text-center">Login</h3>

        <input type="email" id="email" class="form-control my-2" placeholder="Email">
        <input type="password" id="password" class="form-control my-2" placeholder="Password">

        <button class="btn btn-success w-100 mt-3" onclick="login()">Login</button>

        <p class="text-center mt-3">
            Don't have an account? <a href="register.html">Register</a>
        </p>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="js/login.js"></script>

</body>
</html>
